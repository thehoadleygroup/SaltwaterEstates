<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">

  <!-- Background — remove for print, shirt color is the background -->
  <rect width="600" height="700" fill="#0a0a0a"/>

  <!-- QR Code — white background required for scanning -->
  <rect x="200" y="60" width="200" height="200" fill="white"/>
  <image
    href="https://api.qrserver.com/v1/create-qr-code/?size=400x400&amp;data=https://findyourdock.com&amp;bgcolor=ffffff&amp;color=000000&amp;margin=10"
    x="205" y="65"
    width="190" height="190"
  />

  <!-- Tagline -->
  <text
    x="300" y="320"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="32"
    font-weight="300"
    letter-spacing="2"
    fill="#f0e6d0"
    text-anchor="middle"
  >Your boat deserves a home.</text>

  <!-- Rule -->
  <line x1="220" y1="340" x2="380" y2="340" stroke="#c9a96e" stroke-width="1" opacity="0.4"/>

  <!-- BROUGHT TO YOU BY -->
  <text
    x="300" y="375"
    font-family="'Jost', 'Arial', sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="5"
    fill="rgba(240,230,208,0.45)"
    text-anchor="middle"
  >BROUGHT TO YOU BY</text>

  <!-- BAREFOOT REALTY & INVESTMENTS — centered, no wrap -->
  <text
    x="300" y="402"
    font-family="'Jost', 'Arial', sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="4"
    fill="#c9a96e"
    text-anchor="middle"
  >BAREFOOT REALTY &amp; INVESTMENTS</text>

  <!-- License -->
  <text
    x="300" y="430"
    font-family="'Jost', 'Arial', sans-serif"
    font-size="9"
    font-weight="300"
    letter-spacing="2"
    fill="rgba(240,230,208,0.2)"
    text-anchor="middle"
  >LICENSED REAL ESTATE BROKERAGE · FL BK3222885</text>

</svg>
